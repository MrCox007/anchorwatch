[env:esp8266]
platform = espressif8266
board = esp12e
framework = arduino
monitor_speed = 115200
lib_deps =
    mikalhart/TinyGPSPlus@^1.1.0
    adafruit/Adafruit SSD1306@^2.5.0
    adafruit/Adafruit GFX Library@^1.11.0

; Unit tests — runs on your PC, no hardware needed
[env:native]
platform = native
test_filter = test_anchor_logic
build_flags = -DUNITY_INCLUDE_DOUBLE

; Hardware diagnostic — upload to ESP8266 to test components
[env:diag]
platform = espressif8266
board = esp12e
framework = arduino
monitor_speed = 115200
build_src_filter = -<main.cpp> +<../test/hardware_diag/>
build_flags = -DDIAG_MODE
lib_deps =
    mikalhart/TinyGPSPlus@^1.1.0
    adafruit/Adafruit SSD1306@^2.5.0
    adafruit/Adafruit GFX Library@^1.11.0

; OLED + GPS signal test — upload to verify the screen and GPS signal strength
[env:oled]a
platform = espressif8266
board = esp12e
framework = arduino
monitor_speed = 115200
build_src_filter = -<main.cpp> +<../test/oled_test/>
lib_deps =
    mikalhart/TinyGPSPlus@^1.1.0
    adafruit/Adafruit SSD1306@^2.5.0
    adafruit/Adafruit GFX Library@^1.11.0

; Simple blink test
[env:blink]
platform = espressif8266
board = esp12e
framework = arduino
monitor_speed = 115200
upload_port = COM5
monitor_port = COM5
build_src_filter = -<main.cpp> +<../test/blink_test/>
